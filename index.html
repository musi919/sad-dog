<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>🐶 悲伤小狗聊天室</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#e8f5e9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#splash{position:fixed;inset:0;background:#e8f5e9;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;transition:opacity .8s ease,transform .8s ease}
#splash.hide{opacity:0;transform:scale(1.1);pointer-events:none}
#splash .pet{font-size:100px;animation:bounceIn .6s ease}
#splash p{margin-top:12px;font-size:16px;color:#555;animation:fadeUp .8s ease .3s both}
@keyframes bounceIn{0%{transform:scale(0);opacity:0}60%{transform:scale(1.2)}100%{transform:scale(1);opacity:1}}
@keyframes fadeUp{0%{opacity:0;transform:translateY(16px)}100%{opacity:1;transform:translateY(0)}}
#header{background:#e8f5e9;padding:44px 12px 8px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid #c8e6c9}
#header .back{font-size:20px;color:#07c160}
#header .avatar{width:36px;height:36px;border-radius:6px;background:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;overflow:hidden}
#header .info{flex:1}
#header .info .name{font-size:16px;font-weight:600;color:#111}
#header .info .status{font-size:11px;color:#999}
#chat{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:12px;background:#e8f5e9;scroll-behavior:smooth}
#chat::-webkit-scrollbar{width:0}
.msg{max-width:75%;display:flex;align-items:flex-start;gap:8px;animation:msgIn .3s ease}
@keyframes msgIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.msg.dino{align-self:flex-start}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg .av{width:36px;height:36px;border-radius:6px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;background:#fff;overflow:hidden}
.msg.user .av{background:#07c160}
.msg .bubble{padding:8px 12px;border-radius:8px;font-size:15px;line-height:1.5;word-break:break-word}
.msg.dino .bubble{background:#fff;color:#222;border-top-left-radius:2px}
.msg.user .bubble{background:#95ec69;color:#222;border-top-right-radius:2px}
.msg .time-tag{font-size:10px;color:#b2b2b2;margin-top:4px;text-align:right}
#input-bar{flex-shrink:0;display:flex;align-items:center;gap:8px;padding:8px 12px;background:#f7f7f7;border-top:1px solid #c8e6c9}
#input-bar input{flex:1;height:36px;border:none;border-radius:6px;padding:0 10px;font-size:15px;background:#fff;outline:none}
#input-bar button{height:36px;padding:0 18px;border:none;border-radius:6px;background:#07c160;color:#fff;font-size:15px;cursor:pointer;flex-shrink:0}
#input-bar button:active{opacity:.7}
.welcome{text-align:center;color:#999;font-size:12px;margin:20px 0 8px}
</style>
</head>
<body>
<div id="splash"><div class="pet">🐶</div><p>悲伤的小狗正在加载…</p></div>
<div id="header"><span class="back">‹</span><div class="avatar">🐶</div><div class="info"><div class="name">悲伤的恐龙</div><div class="status" id="st">在线</div></div><span style="font-size:20px;color:#666;">⋯</span></div>
<div id="chat"><div class="welcome">你打开了悲伤恐龙的聊天室</div><div class="msg dino"><div class="av">🐶</div><div><div class="bubble">嗨，你来了。🐶</div><div class="time-tag">刚刚</div></div></div></div>
<div id="input-bar"><input type="text" id="inp" placeholder="输入消息…" autofocus><button id="send">发送</button></div>
<script>
setTimeout(()=>{document.getElementById('splash').classList.add('hide')},1200);
const c=document.getElementById('chat'),i=document.getElementById('inp'),s=document.getElementById('st');
function n(){const d=new Date();return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function a(r,t){const d=document.createElement('div');d.className='msg '+r;const av=document.createElement('div');av.className='av';av.textContent=r==='dino'?'🐶':'😶';const w=document.createElement('div');const b=document.createElement('div');b.className='bubble';b.textContent=t;const tm=document.createElement('div');tm.className='time-tag';tm.textContent=n();w.appendChild(b);w.appendChild(tm);d.appendChild(av);d.appendChild(w);c.appendChild(d);c.scrollTop=c.scrollHeight}
document.getElementById('send').onclick=()=>{const t=i.value.trim();if(!t)return;i.value='';a('user',t);s.textContent='正在输入…';setTimeout(()=>{s.textContent='在线';a('dino','悲伤的恐龙来了 🐶')},800+Math.random()*600)};
i.onkeydown=e=>{if(e.key==='Enter')document.getElementById('send').click()};
</script>
</body>
</html>
